version: '3.8'

services:
  backend:
    build: ./backend
    ports:
     - "3008:3008"
    env_file:
     - .env
    depends_on:
     - postgres
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
  postgres:
    image: postgres:16-alpine
    ports:
     - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
     - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  postgres_data: